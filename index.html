<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Selbetti SmartReplace</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo-header">
      <img src="/css/img/smartreplace-logo.png" alt="SmartReplace Logo">
    </div>

    <!-- SIMULADOR -->
    <div class="simulator">
      <select id="modeloSelect"></select>

      <button onclick="simular()">Simular Similaridade</button>
      <button onclick="exportarPDF()">📄 Exportar PDF</button>


      <button onclick="ativarContingencia()"
              id="btnContingencia"
              class="btn-contingencia"
              style="display:none;">
        🔓 Exibir Contingência
      </button>
    </div>

    <!-- RESULTADOS -->
    <div id="resultados"></div>

  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/js/engine.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
